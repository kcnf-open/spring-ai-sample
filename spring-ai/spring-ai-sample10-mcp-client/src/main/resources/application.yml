spring:
    main:
        # 关键：关闭 Web 服务器环境，MCP Server 不需要 Web 功能
        web-application-type: none
        banner-mode: off
    ai:
        mcp:
            server:
                # 启用 STDIO 传输模式，用于本地进程间通信
                stdio: true
                name: my-mcp-server
                version: 1.0.0

logging:
    level:
        root: WARN
        com.kcnf.ai: INFO
    file:
        name: logs/mcp-server.log