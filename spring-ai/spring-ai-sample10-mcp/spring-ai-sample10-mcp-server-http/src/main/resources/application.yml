server:
    port: 8083

spring:
    application:
        name: mcp-server-demo
    ai:
        mcp:
            server:
                enabled: true
                name: "mcp-server-demo"
                version: "1.0.0"
                # 关键配置：启用 Streamable HTTP 传输
                protocol: STREAMABLE
                # Streamable HTTP 端点（默认 /mcp）
                streamable-http:
                    mcp-endpoint: /mcp
                capabilities:
                    tool: true
                    resource: false
                    prompt: false