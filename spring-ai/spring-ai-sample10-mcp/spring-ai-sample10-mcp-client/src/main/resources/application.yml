server:
    port: 8082
spring:
    application:
        name: mcp-client-demo
    ai:
        zhipuai:
            api-key: ${ZHIPUAI_API_KEY}
            chat:
                options:
                    model: glm-4-plus
        mcp:
            client:
                enabled: true
                # 连接配置
                connection:
                    # Server 端 HTTP 地址
                    url: http://localhost:8083/mcp
                    # 传输协议
                    transport: STREAMABLE_HTTP
                    type: SYNC
                # 添加初始化超时配置
                initialization-timeout: 30s
                # 启用工具发现日志
                request-timeout: 60s

# 启用详细日志
logging:
    level:
        org.springframework.ai.mcp: DEBUG
        io.modelcontextprotocol: DEBUG
