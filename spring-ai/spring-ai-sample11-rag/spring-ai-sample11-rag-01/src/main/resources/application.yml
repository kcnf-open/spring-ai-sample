server:
    port: 8082
    context-path: /

# In application.yml
spring:
    ai:
        zhipuai:
            api-key: ${ZHIPUAI_API_KEY}
            chat:
                options:
                    model: glm-4-plus
    datasource:
        url: jdbc:h2:file:./data/chat_memory
        username: sa
        password:
        driver-class-name: org.h2.Driver
    h2:
        console:
            enabled: true
            path: /h2-console
    sql:
        init:
            mode: always
            schema-locations: classpath:schema.sql

# 60s API 地址
news:
    api:
        url: https://60s.viki.moe/v2/60s
    # 定时任务 cron（每天凌晨1点执行，也可改为每5分钟测试：0 */1 * * * ?）
    fetch:
        cron: 0 */30 * * * ?

logging:
    level:
        com.kcnf.ai: INFO
        com.kcnf.ai.service.ChatService: DEBUG
        com.kcnf.ai.tool.NewsTool: DEBUG
