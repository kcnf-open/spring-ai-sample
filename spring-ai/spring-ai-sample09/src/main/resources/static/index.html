<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI 记忆聊天室</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 800px;
            max-width: 95vw;
            height: 85vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #2c3e66;
            color: white;
            padding: 16px 24px;
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .session-info {
            font-size: 0.8rem;
            font-family: monospace;
            background: #1e2a44;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user {
            align-self: flex-end;
            background: #2c3e66;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant {
            align-self: flex-start;
            background: #e9eef3;
            color: #1e2a44;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            display: flex;
            padding: 16px;
            gap: 12px;
            border-top: 1px solid #ddd;
            background: #fafcff;
        }
        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #ccc;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        #messageInput:focus {
            border-color: #2c3e66;
            box-shadow: 0 0 0 2px rgba(44,62,102,0.2);
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 0 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #1e2a44;
        }
        .loading {
            align-self: flex-start;
            background: #e9eef3;
            color: gray;
            font-style: italic;
        }
        .reset-btn {
            background: rgba(255,255,255,0.2);
            margin-left: 10px;
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        .reset-btn:hover {
            background: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <span>🧠 记忆聊天室 (Spring AI + 消息窗口)</span>
        <div>
            <span class="session-info" id="sessionIdDisplay"></span>
            <button class="reset-btn" id="resetSessionBtn">🔄 新会话</button>
        </div>
    </div>
    <div class="messages" id="messagesContainer">
        <div class="message assistant">👋 你好！我是带有持久记忆的AI助手。我会记住这个对话窗口中的内容，试试连续聊天吧～</div>
    </div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
    // 会话ID：存储在 sessionStorage，刷新页面不丢失，关闭标签页重新开始
    let conversationId = sessionStorage.getItem('conversationId');
    if (!conversationId) {
        conversationId = generateUUID();
        sessionStorage.setItem('conversationId', conversationId);
    }
    document.getElementById('sessionIdDisplay').innerText = conversationId.slice(0, 8) + '...';

    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const resetBtn = document.getElementById('resetSessionBtn');

    // 添加一条消息到界面
    function appendMessage(role, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user' : 'assistant'}`;
        msgDiv.innerText = content;
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // 显示“正在输入”提示
    let loadingDiv = null;
    function showLoading() {
        if (loadingDiv) return;
        loadingDiv = document.createElement('div');
        loadingDiv.className = 'message assistant loading';
        loadingDiv.innerText = '⏳ 思考中...';
        messagesContainer.appendChild(loadingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    function hideLoading() {
        if (loadingDiv) {
            loadingDiv.remove();
            loadingDiv = null;
        }
    }

    // 发送消息
    async function sendMessage() {
        const userMessage = messageInput.value.trim();
        if (!userMessage) return;

        appendMessage('user', userMessage);
        messageInput.value = '';
        showLoading();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ conversationId, message: userMessage })
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await response.json();
            hideLoading();
            appendMessage('assistant', data.reply);
        } catch (error) {
            hideLoading();
            appendMessage('assistant', `❌ 请求失败：${error.message}。请检查后端是否运行，OpenAI API Key 是否正确。`);
            console.error(error);
        }
    }

    // 重置会话（新会话ID）
    function resetConversation() {
        conversationId = generateUUID();
        sessionStorage.setItem('conversationId', conversationId);
        document.getElementById('sessionIdDisplay').innerText = conversationId.slice(0, 8) + '...';
        // 清空聊天记录显示（前端只清显示，后端记忆会随新ID自动隔离）
        messagesContainer.innerHTML = '';
        appendMessage('assistant', '✨ 已开启全新会话！之前的记忆已清除（仅针对这个对话窗口）。');
    }

    // 生成简单UUID
    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    // 绑定事件
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    resetBtn.addEventListener('click', resetConversation);
</script>
</body>
</html>
